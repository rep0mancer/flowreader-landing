<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#14141F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B8AFF"/>
      <stop offset="100%" style="stop-color:#8AA2FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6B8AFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6B8AFF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Logo -->
  <g transform="translate(80, 60)">
    <rect width="48" height="48" rx="12" fill="url(#accent)"/>
    <text x="24" y="32" text-anchor="middle" font-size="24">📖</text>
  </g>
  <text x="144" y="93" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">FlowReader</text>
  
  <!-- Main text -->
  <text x="600" y="240" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Lies 3x schneller</text>
  <text x="600" y="300" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="32" fill="#6B7280">RSVP Speed Reading App</text>
  
  <!-- Phone mockup -->
  <g transform="translate(460, 340)">
    <rect width="160" height="260" rx="28" fill="#14141F" stroke="#1F1F2E" stroke-width="2"/>
    <rect x="60" y="8" width="40" height="4" rx="2" fill="#1F1F2E"/>
    <text x="80" y="80" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Schl<tspan fill="#FF6B6B">a</tspan>f</text>
    <rect x="20" y="110" width="120" height="4" rx="2" fill="#1F1F2E"/>
    <rect x="20" y="110" width="54" height="4" rx="2" fill="#6B8AFF"/>
    <circle cx="55" cy="155" r="24" fill="#6B8AFF"/>
    <text x="55" y="162" text-anchor="middle" font-size="16" fill="#0A0A0F">▶</text>
    <text x="80" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#6B7280">300 WPM</text>
  </g>
  
  <!-- Feature pills -->
  <g transform="translate(680, 380)">
    <rect width="160" height="36" rx="18" fill="#14141F" stroke="#1F1F2E"/>
    <text x="80" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">100-1200 WPM</text>
  </g>
  <g transform="translate(680, 430)">
    <rect width="160" height="36" rx="18" fill="#14141F" stroke="#1F1F2E"/>
    <text x="80" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">PDF & ePub Import</text>
  </g>
  <g transform="translate(680, 480)">
    <rect width="160" height="36" rx="18" fill="#14141F" stroke="#1F1F2E"/>
    <text x="80" y="23" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">100% Privat</text>
  </g>
  
  <!-- Bottom text -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">DE • DSGVO-konform • Keine Cloud</text>
</svg>
